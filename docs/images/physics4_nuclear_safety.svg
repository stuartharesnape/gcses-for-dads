<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="100%" height="100%" fill="white"/>

  <text x="480" y="36" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">
    Radiation Safety
  </text>

  <!-- Time -->
  <g transform="translate(90 105)">
    <rect x="0" y="0" width="220" height="210" rx="18" fill="#f8fafc" stroke="#222" stroke-width="2"/>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">Time</text>
    <text x="110" y="90" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Reduce the time</text>
    <text x="110" y="118" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">spent near the source</text>
    <circle cx="110" cy="165" r="28" fill="#222"/>
    <text x="110" y="171" font-family="Arial, sans-serif" font-size="15" text-anchor="middle" fill="white">☢</text>
  </g>

  <!-- Distance -->
  <g transform="translate(370 105)">
    <rect x="0" y="0" width="220" height="210" rx="18" fill="#f8fafc" stroke="#222" stroke-width="2"/>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">Distance</text>
    <text x="110" y="90" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Stay further away</text>
    <text x="110" y="118" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">from the source</text>
    <line x1="55" y1="168" x2="165" y2="168" stroke="#222" stroke-width="3"/>
    <circle cx="55" cy="168" r="10" fill="#222"/>
    <circle cx="165" cy="168" r="10" fill="#222"/>
  </g>

  <!-- Shielding -->
  <g transform="translate(650 105)">
    <rect x="0" y="0" width="220" height="210" rx="18" fill="#f8fafc" stroke="#222" stroke-width="2"/>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">Shielding</text>
    <text x="110" y="90" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Use dense material</text>
    <text x="110" y="118" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">such as lead</text>
    <rect x="80" y="145" width="60" height="50" fill="#9ca3af" stroke="#222" stroke-width="2"/>
  </g>

  <text x="480" y="376" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    Reduce exposure using time, distance and shielding.
  </text>
</svg>