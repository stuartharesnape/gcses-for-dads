<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470">
  <rect width="100%" height="100%" fill="white"/>

  <text x="480" y="36" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">
    Half-Life
  </text>

  <!-- Axes -->
  <line x1="110" y1="380" x2="870" y2="380" stroke="#222" stroke-width="3"/>
  <line x1="110" y1="85" x2="110" y2="380" stroke="#222" stroke-width="3"/>

  <!-- Curve -->
  <polyline points="110,115 300,195 490,255 680,302 870,338"
            fill="none" stroke="#222" stroke-width="4"/>

  <!-- Points -->
  <circle cx="110" cy="115" r="6" fill="#222"/>
  <circle cx="300" cy="195" r="6" fill="#222"/>
  <circle cx="490" cy="255" r="6" fill="#222"/>
  <circle cx="680" cy="302" r="6" fill="#222"/>
  <circle cx="870" cy="338" r="6" fill="#222"/>

  <!-- Labels -->
  <text x="110" y="102" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">800</text>
  <text x="300" y="182" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">400</text>
  <text x="490" y="242" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">200</text>
  <text x="680" y="289" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">100</text>
  <text x="870" y="325" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">50</text>

  <text x="110" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">0</text>
  <text x="300" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">1</text>
  <text x="490" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">2</text>
  <text x="680" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">3</text>
  <text x="870" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">4</text>

  <text x="490" y="446" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    Number of half-lives
  </text>
  <text x="42" y="245" font-family="Arial, sans-serif" font-size="18" transform="rotate(-90 42 245)">
    Amount remaining
  </text>

  <text x="480" y="80" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    Each half-life, the amount of radioactive material halves.
  </text>
</svg>