<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 22px Arial, sans-serif; fill: #111; }
    .label { font: 18px Arial, sans-serif; fill: #111; }
    .small { font: 15px Arial, sans-serif; fill: #444; }
    .box { fill: #f4f7fb; stroke: #2c3e50; stroke-width: 2; rx: 14; }
    .loss { fill: #fff4f4; stroke: #b04a4a; stroke-width: 2; rx: 14; }
    .arrow { stroke: #2c3e50; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .loss-arrow { stroke: #b04a4a; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#b04a4a"/>
    </marker>
  </defs>

  <text x="40" y="35" class="title">Energy Transfer Diagram</text>
  <text x="40" y="62" class="small">Example: Roller coaster going downhill</text>

  <!-- Boxes -->
  <rect x="40" y="100" width="210" height="70" class="box"/>
  <text x="145" y="128" text-anchor="middle" class="label">Gravitational</text>
  <text x="145" y="152" text-anchor="middle" class="label">Potential Energy</text>

  <rect x="310" y="100" width="180" height="70" class="box"/>
  <text x="400" y="128" text-anchor="middle" class="label">Kinetic</text>
  <text x="400" y="152" text-anchor="middle" class="label">Energy</text>

  <rect x="570" y="55" width="170" height="60" class="loss"/>
  <text x="655" y="80" text-anchor="middle" class="label">Thermal</text>
  <text x="655" y="102" text-anchor="middle" class="small">heat from friction</text>

  <rect x="570" y="145" width="170" height="60" class="loss"/>
  <text x="655" y="170" text-anchor="middle" class="label">Sound</text>
  <text x="655" y="192" text-anchor="middle" class="small">some energy dissipated</text>

  <!-- Arrows -->
  <line x1="250" y1="135" x2="310" y2="135" class="arrow"/>
  <line x1="490" y1="120" x2="570" y2="85" class="loss-arrow"/>
  <line x1="490" y1="150" x2="570" y2="175" class="loss-arrow"/>

  <!-- Notes -->
  <text x="400" y="235" text-anchor="middle" class="small">
    Energy is transferred between stores. It is not created or destroyed.
  </text>
</svg>