<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2c3e50"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .label { font: 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .floor { stroke: #6b7280; stroke-width: 4; }
      .earth { fill: #93c5fd; stroke: #2563eb; stroke-width: 2; }
      .land { fill: #34d399; }
      .arrow { stroke: #2c3e50; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .support { stroke: #059669; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .weight { stroke: #dc2626; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .push { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .friction { stroke: #ea580c; stroke-width: 4; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <text x="500" y="40" text-anchor="middle" class="title">Contact and Non-contact Forces</text>

  <rect x="40" y="70" width="430" height="400" class="panel"/>
  <rect x="530" y="70" width="430" height="400" class="panel"/>

  <text x="255" y="105" text-anchor="middle" class="subtitle">Contact forces</text>
  <line x1="100" y1="350" x2="410" y2="350" class="floor"/>
  <rect x="180" y="270" width="120" height="80" rx="8" class="box"/>

  <line x1="110" y1="310" x2="170" y2="310" class="push"/>
  <text x="78" y="303" class="label">push</text>

  <line x1="370" y1="310" x2="310" y2="310" class="friction"/>
  <text x="373" y="303" class="label">friction</text>

  <line x1="240" y1="230" x2="240" y2="265" class="weight"/>
  <text x="252" y="228" class="label">weight</text>

  <line x1="240" y1="390" x2="240" y2="355" class="support"/>
  <text x="252" y="405" class="label">support force</text>

  <circle cx="95" cy="305" r="22" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <rect x="74" y="317" width="38" height="20" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="2"/>

  <text x="255" y="435" text-anchor="middle" class="small">Objects touch, so the forces are contact forces.</text>

  <text x="745" y="105" text-anchor="middle" class="subtitle">Non-contact forces</text>
  <circle cx="745" cy="360" r="95" class="earth"/>
  <path d="M690 340 C720 300, 760 310, 790 335 C770 355, 735 362, 700 355 Z" class="land"/>
  <path d="M760 385 C785 365, 815 373, 830 395 C800 410, 775 410, 760 385 Z" class="land"/>

  <circle cx="745" cy="180" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <line x1="745" y1="215" x2="745" y2="255" class="weight"/>
  <text x="760" y="240" class="label">gravity</text>

  <text x="745" y="435" text-anchor="middle" class="small">Gravity acts at a distance without touching.</text>
</svg>