<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <rect width="100%" height="100%" fill="white"/>

  <text x="480" y="36" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">
    Carbon Isotopes
  </text>

  <!-- Carbon-12 -->
  <g transform="translate(170 95)">
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Carbon-12</text>
    <circle cx="0" cy="70" r="58" fill="#f1f5f9" stroke="#222" stroke-width="2"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">6 protons</text>
    <text x="0" y="88" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">6 neutrons</text>
  </g>

  <!-- Carbon-13 -->
  <g transform="translate(480 95)">
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Carbon-13</text>
    <circle cx="0" cy="70" r="58" fill="#f1f5f9" stroke="#222" stroke-width="2"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">6 protons</text>
    <text x="0" y="88" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">7 neutrons</text>
  </g>

  <!-- Carbon-14 -->
  <g transform="translate(790 95)">
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Carbon-14</text>
    <circle cx="0" cy="70" r="58" fill="#f1f5f9" stroke="#222" stroke-width="2"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">6 protons</text>
    <text x="0" y="88" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">8 neutrons</text>
  </g>

  <text x="480" y="305" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">
    Same number of protons, different numbers of neutrons
  </text>
  <text x="480" y="336" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    That means they are the same element, but different isotopes.
  </text>
</svg>