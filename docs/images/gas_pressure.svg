<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill: none; stroke: #333; stroke-width: 3; }
    .particle { fill: #1f77b4; }
    .arrow { stroke: #d62728; stroke-width: 2; marker-end: url(#arrowhead); }
    .text { font-family: Arial, sans-serif; font-size: 14px; fill: #111; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d62728" />
    </marker>
  </defs>

  <!-- Container -->
  <rect x="50" y="50" width="400" height="200" class="box"/>

  <!-- Particles -->
  <circle cx="120" cy="100" r="6" class="particle"/>
  <circle cx="200" cy="150" r="6" class="particle"/>
  <circle cx="300" cy="90" r="6" class="particle"/>
  <circle cx="350" cy="180" r="6" class="particle"/>
  <circle cx="150" cy="200" r="6" class="particle"/>

  <!-- Motion arrows -->
  <line x1="120" y1="100" x2="160" y2="80" class="arrow"/>
  <line x1="200" y1="150" x2="240" y2="170" class="arrow"/>
  <line x1="300" y1="90" x2="340" y2="110" class="arrow"/>
  <line x1="350" y1="180" x2="390" y2="160" class="arrow"/>
  <line x1="150" y1="200" x2="120" y2="170" class="arrow"/>

  <!-- Collision arrows to wall -->
  <line x1="430" y1="120" x2="450" y2="120" class="arrow"/>
  <line x1="430" y1="180" x2="450" y2="180" class="arrow"/>

  <!-- Label -->
  <text x="250" y="280" class="text">Particles collide with walls → force → pressure</text>

</svg>