<!-- ../images/physics6_refraction.svg -->
<svg width="700" height="280" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label { font: 16px sans-serif; fill: #222; }
    .small { font: 13px sans-serif; fill: #333; }
    .arrow { stroke: #222; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .boundary { stroke: #222; stroke-width: 3; }
    .normal { stroke: #999; stroke-width: 2; stroke-dasharray: 5 5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>

  <text x="30" y="30" class="label">Refraction</text>
  <line x1="60" y1="150" x2="640" y2="150" class="boundary"/>
  <line x1="350" y1="50" x2="350" y2="240" class="normal"/>

  <line x1="220" y1="70" x2="350" y2="150" class="arrow"/>
  <line x1="350" y1="150" x2="420" y2="235" class="arrow"/>

  <text x="100" y="110" class="small">air</text>
  <text x="100" y="190" class="small">water / denser medium</text>
  <text x="165" y="60" class="small">incident ray</text>
  <text x="430" y="240" class="small">refracted ray</text>
  <text x="430" y="100" class="small">speed changes</text>
  <text x="430" y="120" class="small">direction changes</text>
</svg>