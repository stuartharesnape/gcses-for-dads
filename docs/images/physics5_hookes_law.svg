<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2c3e50"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .label { font: 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .ceiling { stroke: #6b7280; stroke-width: 6; }
      .spring { fill: none; stroke: #2563eb; stroke-width: 4; }
      .mass { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .arrow { stroke: #dc2626; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .measure { stroke: #059669; stroke-width: 3; fill: none; }
      .axis { stroke: #374151; stroke-width: 2.5; }
      .graph { fill: none; stroke: #7c3aed; stroke-width: 4; }
      .dash { stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <text x="500" y="40" text-anchor="middle" class="title">Hooke's Law</text>

  <rect x="40" y="70" width="620" height="440" class="panel"/>
  <text x="350" y="105" text-anchor="middle" class="subtitle">Spring extension</text>

  <line x1="140" y1="140" x2="280" y2="140" class="ceiling"/>
  <line x1="390" y1="140" x2="530" y2="140" class="ceiling"/>

  <path d="M210 140
           L210 160
           Q195 170 210 180
           Q225 190 210 200
           Q195 210 210 220
           Q225 230 210 240
           Q195 250 210 260
           Q225 270 210 280
           L210 300" class="spring"/>
  <rect x="180" y="300" width="60" height="55" rx="6" class="mass"/>
  <text x="210" y="380" text-anchor="middle" class="label">original length</text>

  <path d="M460 140
           L460 160
           Q445 172 460 184
           Q475 196 460 208
           Q445 220 460 232
           Q475 244 460 256
           Q445 268 460 280
           Q475 292 460 304
           Q445 316 460 328
           Q475 340 460 352
           L460 370" class="spring"/>
  <rect x="425" y="370" width="70" height="65" rx="6" class="mass"/>
  <line x1="460" y1="445" x2="460" y2="495" class="arrow"/>
  <text x="475" y="480" class="label">force</text>
  <text x="460" y="520" text-anchor="middle" class="label">stretched length</text>

  <line x1="315" y1="300" x2="315" y2="370" class="measure"/>
  <line x1="305" y1="300" x2="325" y2="300" class="measure"/>
  <line x1="305" y1="370" x2="325" y2="370" class="measure"/>
  <text x="332" y="339" class="label">extension</text>

  <text x="350" y="470" text-anchor="middle" class="label">F = kx</text>

  <rect x="700" y="110" width="250" height="300" class="panel"/>
  <text x="825" y="145" text-anchor="middle" class="subtitle">Force-extension graph</text>
  <line x1="760" y1="360" x2="760" y2="190" class="axis"/>
  <line x1="760" y1="360" x2="910" y2="360" class="axis"/>
  <text x="720" y="200" class="small">force</text>
  <text x="855" y="390" class="small">extension</text>
  <path d="M760 360 L850 250" class="graph"/>
  <line x1="850" y1="250" x2="850" y2="360" class="dash"/>
  <text x="860" y="245" class="small">limit of</text>
  <text x="860" y="262" class="small">proportionality</text>
</svg>