  <path d="M420 430 a30 30 0 0 0 60 0 a30 30 0 0 0 -60 0" fill="none" stroke="#111" stroke-width="5"/>
  <line x1="420" y1="430" x2="392" y2="460" stroke="#111" stroke-width="4"/>
