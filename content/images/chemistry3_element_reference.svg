<svg width="820" height="360" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 24px Arial, sans-serif; fill: #111; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
    .symbol { font: bold 32px Arial, sans-serif; fill: #111; text-anchor: middle; }
    .mass { font: bold 20px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
    .name { font: 14px Arial, sans-serif; fill: #475569; text-anchor: middle; }
    .note { font: 16px Arial, sans-serif; fill: #333; }
  </style>

  <rect width="100%" height="100%" fill="white"/>

  <text x="30" y="40" class="title">Element reference (use for calculations)</text>

  <!-- Row 1 -->
  <rect x="30" y="70" width="100" height="100" class="box"/>
  <text x="80" y="105" class="mass">1</text>
  <text x="80" y="140" class="symbol">H</text>
  <text x="80" y="160" class="name">Hydrogen</text>

  <rect x="150" y="70" width="100" height="100" class="box"/>
  <text x="200" y="105" class="mass">12</text>
  <text x="200" y="140" class="symbol">C</text>
  <text x="200" y="160" class="name">Carbon</text>

  <rect x="270" y="70" width="100" height="100" class="box"/>
  <text x="320" y="105" class="mass">14</text>
  <text x="320" y="140" class="symbol">N</text>
  <text x="320" y="160" class="name">Nitrogen</text>

  <rect x="390" y="70" width="100" height="100" class="box"/>
  <text x="440" y="105" class="mass">16</text>
  <text x="440" y="140" class="symbol">O</text>
  <text x="440" y="160" class="name">Oxygen</text>

  <rect x="510" y="70" width="100" height="100" class="box"/>
  <text x="560" y="105" class="mass">24</text>
  <text x="560" y="140" class="symbol">Mg</text>
  <text x="560" y="160" class="name">Magnesium</text>

  <rect x="630" y="70" width="120" height="100" class="box"/>
  <text x="690" y="105" class="mass">35.5</text>
  <text x="690" y="140" class="symbol">Cl</text>
  <text x="690" y="160" class="name">Chlorine</text>
</svg>