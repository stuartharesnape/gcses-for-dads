<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .axis { stroke: #9ca3af; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .vec { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .pt { fill: #2563eb; }
      .label { font: 16px Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <!-- Grid -->
  <g>
    <!-- vertical lines -->
    <line x1="60" y1="60" x2="60" y2="360" class="grid"/>
    <line x1="120" y1="60" x2="120" y2="360" class="grid"/>
    <line x1="180" y1="60" x2="180" y2="360" class="grid"/>
    <line x1="240" y1="60" x2="240" y2="360" class="grid"/>
    <line x1="300" y1="60" x2="300" y2="360" class="grid"/>
    <line x1="360" y1="60" x2="360" y2="360" class="grid"/>

    <!-- horizontal lines -->
    <line x1="60" y1="60" x2="360" y2="60" class="grid"/>
    <line x1="60" y1="120" x2="360" y2="120" class="grid"/>
    <line x1="60" y1="180" x2="360" y2="180" class="grid"/>
    <line x1="60" y1="240" x2="360" y2="240" class="grid"/>
    <line x1="60" y1="300" x2="360" y2="300" class="grid"/>
    <line x1="60" y1="360" x2="360" y2="360" class="grid"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="360" x2="360" y2="360" class="axis"/>
  <line x1="60" y1="360" x2="60" y2="60" class="axis"/>

  <!-- Origin -->
  <circle cx="60" cy="360" r="5" class="pt"/>
  <text x="45" y="385" class="label">O (0,0)</text>

  <!-- Point A (2,3) -->
  <!-- Each square = 60px -->
  <circle cx="180" cy="180" r="5" class="pt"/>
  <text x="190" y="175" class="label">A (2,3)</text>

  <!-- Vector OA -->
  <line x1="60" y1="360" x2="180" y2="180" class="vec"/>
  <text x="105" y="250" class="label">OA = (2,3)</text>

</svg>