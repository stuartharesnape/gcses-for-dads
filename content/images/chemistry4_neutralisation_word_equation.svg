<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box {
        fill: #f8fafc;
        stroke: #475569;
        stroke-width: 2;
        rx: 12;
      }
      .label {
        font: bold 28px Arial, sans-serif;
        fill: #111827;
      }
      .symbol {
        font: bold 34px Arial, sans-serif;
        fill: #111827;
      }
    </style>
  </defs>

  <rect x="30" y="50" width="140" height="60" class="box"/>
  <text x="100" y="88" text-anchor="middle" class="label">Acid</text>

  <text x="205" y="90" text-anchor="middle" class="symbol">+</text>

  <rect x="240" y="50" width="140" height="60" class="box"/>
  <text x="310" y="88" text-anchor="middle" class="label">Base</text>

  <text x="430" y="90" text-anchor="middle" class="symbol">→</text>

  <rect x="480" y="50" width="120" height="60" class="box"/>
  <text x="540" y="88" text-anchor="middle" class="label">Salt</text>

  <text x="635" y="90" text-anchor="middle" class="symbol">+</text>

  <rect x="670" y="50" width="100" height="60" class="box"/>
  <text x="720" y="88" text-anchor="middle" class="label">Water</text>
</svg>