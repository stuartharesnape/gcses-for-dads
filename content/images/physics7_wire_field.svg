<!-- ../images/physics7_wire_field.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111; }
      .text { font: 18px Arial, sans-serif; fill: #222; }
      .field { fill: none; stroke: #333; stroke-width: 3; marker-end: url(#arrow2); }
      .guide { stroke: #777; stroke-dasharray: 6 6; stroke-width: 2; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#fff"/>
  <text x="350" y="38" text-anchor="middle" class="title">Magnetic field around a straight wire</text>

  <line x1="350" y1="100" x2="350" y2="400" stroke="#111" stroke-width="8"/>
  <polygon points="350,80 338,105 362,105" fill="#111"/>
  <text x="390" y="95" class="text">Current</text>

  <circle cx="350" cy="250" r="55" class="field"/>
  <circle cx="350" cy="250" r="100" class="field"/>
  <circle cx="350" cy="250" r="145" class="field"/>

  <path d="M350 250 m55 0 a55 55 0 0 1 -1 0" class="guide" fill="none"/>
  <text x="90" y="455" class="text">Field lines are circles around the wire</text>
</svg>