<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <style>
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .heat { fill: #fff3e0; stroke: #cc5500; stroke-width: 2; }
    .main { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #111; font-weight: bold; }
    .sub { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #444; }
    .heattext { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #aa3300; font-weight: bold; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#333"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="55" width="260" height="90" rx="14" ry="14"/>
  <text class="main" x="170" y="92" text-anchor="middle">Fuel + oxygen</text>
  <text class="sub" x="170" y="123" text-anchor="middle">(high energy)</text>

  <line class="arrow" x1="310" y1="100" x2="560" y2="100"/>

  <rect class="box" x="580" y="55" width="280" height="90" rx="14" ry="14"/>
  <text class="main" x="720" y="92" text-anchor="middle">Carbon dioxide + water</text>
  <text class="sub" x="720" y="123" text-anchor="middle">(lower energy)</text>

  <line class="arrow" x1="450" y1="112" x2="450" y2="170"/>
  <rect class="heat" x="350" y="170" width="200" height="40" rx="14" ry="14"/>
  <text class="heattext" x="450" y="196" text-anchor="middle">Heat released</text>
</svg>