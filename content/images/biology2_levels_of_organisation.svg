<!-- filename: biology2_levels_of_organisation.svg -->
<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: none; stroke: #111; stroke-width: 2.5; rx: 12; ry: 12; }
    .label { font: 18px Arial, sans-serif; fill: #111; }
    .small { font: 15px Arial, sans-serif; fill: #333; }
    .arrow { stroke: #111; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#111"/>
    </marker>
  </defs>

  <rect x="20" y="70" width="130" height="70" class="box"/>
  <text x="85" y="100" text-anchor="middle" class="label">Cells</text>
  <text x="85" y="122" text-anchor="middle" class="small">basic units</text>

  <rect x="190" y="70" width="130" height="70" class="box"/>
  <text x="255" y="100" text-anchor="middle" class="label">Tissues</text>
  <text x="255" y="122" text-anchor="middle" class="small">similar cells</text>

  <rect x="360" y="70" width="130" height="70" class="box"/>
  <text x="425" y="100" text-anchor="middle" class="label">Organs</text>
  <text x="425" y="122" text-anchor="middle" class="small">different tissues</text>

  <rect x="530" y="70" width="170" height="70" class="box"/>
  <text x="615" y="100" text-anchor="middle" class="label">Organ systems</text>
  <text x="615" y="122" text-anchor="middle" class="small">organs together</text>

  <rect x="740" y="70" width="140" height="70" class="box"/>
  <text x="810" y="100" text-anchor="middle" class="label">Organism</text>
  <text x="810" y="122" text-anchor="middle" class="small">whole living thing</text>

  <line x1="150" y1="105" x2="190" y2="105" class="arrow"/>
  <line x1="320" y1="105" x2="360" y2="105" class="arrow"/>
  <line x1="490" y1="105" x2="530" y2="105" class="arrow"/>
  <line x1="700" y1="105" x2="740" y2="105" class="arrow"/>
</svg>