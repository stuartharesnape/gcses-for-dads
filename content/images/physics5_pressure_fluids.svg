<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .label { font: 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .tank { fill: none; stroke: #6b7280; stroke-width: 4; }
      .water { fill: #bfdbfe; }
      .jet { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; }
      .line { stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <text x="500" y="40" text-anchor="middle" class="title">Pressure in Liquids</text>

  <rect x="60" y="70" width="880" height="430" class="panel"/>
  <text x="500" y="105" text-anchor="middle" class="subtitle">Pressure increases with depth</text>

  <path d="M220 150 L220 430 L470 430 L470 150" class="tank"/>
  <rect x="223" y="180" width="244" height="247" class="water"/>
  <line x1="220" y1="180" x2="470" y2="180" stroke="#2563eb" stroke-width="3"/>

  <circle cx="470" cy="230" r="5" fill="#1d4ed8"/>
  <circle cx="470" cy="300" r="5" fill="#1d4ed8"/>
  <circle cx="470" cy="380" r="5" fill="#1d4ed8"/>

  <path d="M475 230 C560 228, 600 228, 650 232" class="jet"/>
  <path d="M475 300 C590 295, 670 300, 760 320" class="jet"/>
  <path d="M475 380 C620 365, 760 385, 900 435" class="jet"/>

  <line x1="510" y1="230" x2="510" y2="180" class="line"/>
  <line x1="510" y1="300" x2="510" y2="180" class="line"/>
  <line x1="510" y1="380" x2="510" y2="180" class="line"/>

  <text x="675" y="220" class="label">low pressure</text>
  <text x="770" y="305" class="label">higher pressure</text>
  <text x="805" y="455" class="label">highest pressure</text>

  <text x="500" y="470" text-anchor="middle" class="small">The lowest hole has the greatest pressure, so the water sprays furthest.</text>
</svg>