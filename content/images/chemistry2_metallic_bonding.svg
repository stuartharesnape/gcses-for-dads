<!-- File: chemistry2_metallic_bonding.svg -->
<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #222; }
    .label { font: 22px Arial, sans-serif; fill: #222; }
    .small { font: 18px Arial, sans-serif; fill: #333; }
    .ion { fill: #f1f1f1; stroke: #333; stroke-width: 2; }
    .electron { fill: #222; }
    .ionText { font: bold 24px Arial, sans-serif; fill: #222; }
    .plus { font: bold 22px Arial, sans-serif; fill: #222; }
  </style>

  <text x="450" y="40" text-anchor="middle" class="title">Metallic Bonding</text>
  <text x="450" y="75" text-anchor="middle" class="small">Positive metal ions in a sea of delocalised electrons</text>

  <!-- Metal ions lattice -->
  <circle cx="180" cy="150" r="38" class="ion"/>
  <circle cx="330" cy="150" r="38" class="ion"/>
  <circle cx="480" cy="150" r="38" class="ion"/>
  <circle cx="630" cy="150" r="38" class="ion"/>
  <circle cx="780" cy="150" r="38" class="ion"/>

  <circle cx="255" cy="260" r="38" class="ion"/>
  <circle cx="405" cy="260" r="38" class="ion"/>
  <circle cx="555" cy="260" r="38" class="ion"/>
  <circle cx="705" cy="260" r="38" class="ion"/>

  <text x="180" y="158" text-anchor="middle" class="ionText">M</text>
  <text x="330" y="158" text-anchor="middle" class="ionText">M</text>
  <text x="480" y="158" text-anchor="middle" class="ionText">M</text>
  <text x="630" y="158" text-anchor="middle" class="ionText">M</text>
  <text x="780" y="158" text-anchor="middle" class="ionText">M</text>
  <text x="255" y="268" text-anchor="middle" class="ionText">M</text>
  <text x="405" y="268" text-anchor="middle" class="ionText">M</text>
  <text x="555" y="268" text-anchor="middle" class="ionText">M</text>
  <text x="705" y="268" text-anchor="middle" class="ionText">M</text>

  <text x="208" y="128" class="plus">+</text>
  <text x="358" y="128" class="plus">+</text>
  <text x="508" y="128" class="plus">+</text>
  <text x="658" y="128" class="plus">+</text>
  <text x="808" y="128" class="plus">+</text>
  <text x="283" y="238" class="plus">+</text>
  <text x="433" y="238" class="plus">+</text>
  <text x="583" y="238" class="plus">+</text>
  <text x="733" y="238" class="plus">+</text>

  <!-- Delocalised electrons -->
  <circle cx="120" cy="220" r="6" class="electron"/>
  <circle cx="170" cy="305" r="6" class="electron"/>
  <circle cx="230" cy="200" r="6" class="electron"/>
  <circle cx="300" cy="320" r="6" class="electron"/>
  <circle cx="355" cy="205" r="6" class="electron"/>
  <circle cx="430" cy="320" r="6" class="electron"/>
  <circle cx="495" cy="205" r="6" class="electron"/>
  <circle cx="575" cy="320" r="6" class="electron"/>
  <circle cx="635" cy="205" r="6" class="electron"/>
  <circle cx="720" cy="315" r="6" class="electron"/>
  <circle cx="795" cy="220" r="6" class="electron"/>
  <circle cx="835" cy="305" r="6" class="electron"/>
  <circle cx="275" cy="95" r="6" class="electron"/>
  <circle cx="430" cy="95" r="6" class="electron"/>
  <circle cx="585" cy="95" r="6" class="electron"/>

  <text x="450" y="370" text-anchor="middle" class="small">Strong attraction between positive ions and delocalised electrons</text>
  <text x="450" y="398" text-anchor="middle" class="small">This helps explain why metals conduct electricity and heat</text>
</svg>