<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#333333" />
    </marker>
    <style>
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #222222; }
      .label { font: 700 22px Arial, Helvetica, sans-serif; fill: #222222; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #333333; }
      .box { fill: #f7f7f7; stroke: #333333; stroke-width: 3; rx: 18; ry: 18; }
      .arrow { fill: none; stroke: #333333; stroke-width: 4; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #333333; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="450" y="42" text-anchor="middle" class="title">Iteration Loop</text>

  <rect x="60" y="140" width="180" height="100" class="box" />
  <text x="150" y="172" text-anchor="middle" class="label">
    <tspan x="150" dy="0">Start value</tspan>
  </text>
  <text x="150" y="198" text-anchor="middle" class="small">
    <tspan x="150" dy="0">for example</tspan>
    <tspan x="150" dy="22">x₁ = 4</tspan>
  </text>

  <rect x="360" y="140" width="180" height="100" class="box" />
  <text x="450" y="172" text-anchor="middle" class="label">
    <tspan x="450" dy="0">Apply rule</tspan>
  </text>
  <text x="450" y="198" text-anchor="middle" class="small">
    <tspan x="450" dy="0">for example</tspan>
    <tspan x="450" dy="22">xₙ₊₁ = f(xₙ)</tspan>
  </text>

  <rect x="660" y="140" width="180" height="100" class="box" />
  <text x="750" y="172" text-anchor="middle" class="label">
    <tspan x="750" dy="0">New value</tspan>
  </text>
  <text x="750" y="198" text-anchor="middle" class="small">
    <tspan x="750" dy="0">this becomes</tspan>
    <tspan x="750" dy="22">the next x</tspan>
  </text>

  <path d="M240 190 L360 190" class="arrow" />
  <path d="M540 190 L660 190" class="arrow" />

  <path d="M750 240
           C750 330, 250 330, 250 250
           C250 230, 250 215, 250 190
           L360 190" class="loop" />

  <text x="490" y="350" text-anchor="middle" class="small">
    <tspan x="490" dy="0">Repeat the process until the values settle</tspan>
    <tspan x="490" dy="22">to a stable answer</tspan>
  </text>
</svg>