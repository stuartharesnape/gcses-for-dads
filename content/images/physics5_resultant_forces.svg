<!-- filename: physics1_balanced_and_unbalanced_forces.svg -->
<svg width="980" height="420" viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #222; }
    .heading { font: bold 22px Arial, sans-serif; fill: #222; }
    .label { font: 18px Arial, sans-serif; fill: #222; }
    .small { font: 16px Arial, sans-serif; fill: #333; }
    .box { fill: none; stroke: #333; stroke-width: 2.5; }
    .panel { fill: none; stroke: #333; stroke-width: 2.5; }
    .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="490" y="36" text-anchor="middle" class="title">
    Balanced and Unbalanced Forces
  </text>

  <!-- Balanced forces -->
  <rect x="60" y="70" width="860" height="140" class="panel"/>
  <text x="490" y="100" text-anchor="middle" class="heading">Balanced forces</text>

  <rect x="430" y="120" width="120" height="60" class="box"/>

  <!-- Left force -->
  <line x1="340" y1="150" x2="420" y2="150" class="arrow"/>
  <text x="320" y="144" text-anchor="end" class="label">10 N</text>

  <!-- Right force -->
  <line x1="640" y1="150" x2="560" y2="150" class="arrow"/>
  <text x="660" y="144" class="label">10 N</text>

  <text x="490" y="200" text-anchor="middle" class="label">
    resultant force = 0
  </text>

  <text x="490" y="225" text-anchor="middle" class="small">
    Object stays still or moves at constant speed
  </text>

  <!-- Unbalanced forces -->
  <rect x="60" y="250" width="860" height="140" class="panel"/>
  <text x="490" y="280" text-anchor="middle" class="heading">Unbalanced forces</text>

  <rect x="430" y="300" width="120" height="60" class="box"/>

  <!-- Smaller force -->
  <line x1="360" y1="330" x2="420" y2="330" class="arrow"/>
  <text x="340" y="324" text-anchor="end" class="label">5 N</text>

  <!-- Larger force -->
  <line x1="700" y1="330" x2="560" y2="330" class="arrow"/>
  <text x="720" y="324" class="label">12 N</text>

  <text x="490" y="380" text-anchor="middle" class="label">
    resultant force to the left
  </text>

  <text x="490" y="405" text-anchor="middle" class="small">
    Object speeds up in the direction of the larger force
  </text>
</svg>