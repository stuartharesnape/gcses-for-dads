<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font: bold 18px Arial, sans-serif; fill: #111827; }
      .small { font: 16px Arial, sans-serif; fill: #374151; }
      .box { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2; rx: 12; }
      .electrode { stroke: #111827; stroke-width: 6; }
      .wire { stroke: #111827; stroke-width: 3; fill: none; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Electrolyte container -->
  <rect x="150" y="100" width="500" height="220" class="box"/>
  <text x="400" y="130" text-anchor="middle" class="small">Electrolyte (liquid or molten)</text>

  <!-- Electrodes -->
  <line x1="250" y1="140" x2="250" y2="300" class="electrode"/>
  <line x1="550" y1="140" x2="550" y2="300" class="electrode"/>

  <!-- Labels directly under electrodes -->
  <text x="250" y="330" text-anchor="middle" class="label">Negative (−)</text>
  <text x="550" y="330" text-anchor="middle" class="label">Positive (+)</text>

  <!-- Power supply (clearly connected) -->
  <rect x="340" y="40" width="120" height="40" class="box"/>
  <text x="400" y="65" text-anchor="middle" class="small">Power</text>

  <!-- Wires -->
  <path d="M250 140 L250 80 L340 80" class="wire"/>
  <path d="M550 140 L550 80 L460 80" class="wire"/>

  <!-- Ion movement -->
  <line x1="450" y1="220" x2="270" y2="220" class="arrow"/>
  <text x="360" y="205" text-anchor="middle" class="small">Positive ions → negative electrode</text>

  <line x1="350" y1="260" x2="530" y2="260" class="arrow"/>
  <text x="440" y="285" text-anchor="middle" class="small">Negative ions → positive electrode</text>

</svg>