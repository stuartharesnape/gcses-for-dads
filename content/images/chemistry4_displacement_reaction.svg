<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box {
        fill: #f8fafc;
        stroke: #475569;
        stroke-width: 2;
        rx: 12;
      }
      .label {
        font: bold 24px Arial, sans-serif;
        fill: #111827;
      }
      .symbol {
        font: bold 30px Arial, sans-serif;
        fill: #111827;
      }
    </style>
  </defs>

  <rect x="20" y="80" width="120" height="60" class="box"/>
  <text x="80" y="118" text-anchor="middle" class="label">Zinc</text>

  <text x="165" y="120" text-anchor="middle" class="symbol">+</text>

  <rect x="190" y="80" width="220" height="60" class="box"/>
  <text x="300" y="118" text-anchor="middle" class="label">Copper sulfate</text>

  <text x="450" y="120" text-anchor="middle" class="symbol">→</text>

  <rect x="490" y="80" width="190" height="60" class="box"/>
  <text x="585" y="118" text-anchor="middle" class="label">Zinc sulfate</text>

  <text x="715" y="120" text-anchor="middle" class="symbol">+</text>

  <rect x="740" y="80" width="140" height="60" class="box"/>
  <text x="810" y="118" text-anchor="middle" class="label">Copper</text>
</svg>