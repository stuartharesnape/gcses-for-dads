<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 26px Arial, sans-serif; fill: #111; }
    .subtitle { font: 16px Arial, sans-serif; fill: #333; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
    .symbol { font: bold 34px Arial, sans-serif; fill: #111; text-anchor: middle; }
    .name { font: 15px Arial, sans-serif; fill: #334155; text-anchor: middle; }
    .mass { font: bold 22px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
    .small { font: 15px Arial, sans-serif; fill: #475569; }
    .formula { font: bold 22px Arial, sans-serif; fill: #111; }
    .example { font: 18px Arial, sans-serif; fill: #222; }
    .label { font: bold 18px Arial, sans-serif; fill: #111; }
  </style>

  <rect width="100%" height="100%" fill="white"/>

  <text x="40" y="45" class="title">Relative atomic masses used in this chapter</text>
  <text x="40" y="75" class="subtitle">Use these values to calculate Mr, moles and masses in the practice questions.</text>

  <!-- Top row -->
  <rect x="40" y="110" width="110" height="110" class="box"/>
  <text x="95" y="145" class="mass">1</text>
  <text x="95" y="183" class="symbol">H</text>
  <text x="95" y="206" class="name">Hydrogen</text>

  <rect x="170" y="110" width="110" height="110" class="box"/>
  <text x="225" y="145" class="mass">12</text>
  <text x="225" y="183" class="symbol">C</text>
  <text x="225" y="206" class="name">Carbon</text>

  <rect x="300" y="110" width="110" height="110" class="box"/>
  <text x="355" y="145" class="mass">14</text>
  <text x="355" y="183" class="symbol">N</text>
  <text x="355" y="206" class="name">Nitrogen</text>

  <rect x="430" y="110" width="110" height="110" class="box"/>
  <text x="485" y="145" class="mass">16</text>
  <text x="485" y="183" class="symbol">O</text>
  <text x="485" y="206" class="name">Oxygen</text>

  <rect x="560" y="110" width="110" height="110" class="box"/>
  <text x="615" y="145" class="mass">24</text>
  <text x="615" y="183" class="symbol">Mg</text>
  <text x="615" y="206" class="name">Magnesium</text>

  <rect x="690" y="110" width="110" height="110" class="box"/>
  <text x="745" y="145" class="mass">35.5</text>
  <text x="745" y="183" class="symbol">Cl</text>
  <text x="745" y="206" class="name">Chlorine</text>

  <!-- Lower explanation -->
  <text x="40" y="275" class="label">How to use them</text>

  <text x="40" y="315" class="formula">H₂O</text>
  <text x="120" y="315" class="example">→ (2 × 1) + 16 = 18</text>

  <text x="40" y="350" class="formula">CO₂</text>
  <text x="120" y="350" class="example">→ 12 + (2 × 16) = 44</text>

  <text x="40" y="385" class="formula">MgO</text>
  <text x="120" y="385" class="example">→ 24 + 16 = 40</text>

  <text x="410" y="315" class="formula">O₂</text>
  <text x="480" y="315" class="example">→ 2 × 16 = 32</text>

  <text x="410" y="350" class="formula">MgCl₂</text>
  <text x="520" y="350" class="example">→ 24 + (2 × 35.5) = 95</text>

  <text x="410" y="385" class="formula">NH₃</text>
  <text x="500" y="385" class="example">→ 14 + (3 × 1) = 17</text>
</svg>