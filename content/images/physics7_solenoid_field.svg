<!-- ../images/physics7_solenoid_field.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111; }
      .text { font: 18px Arial, sans-serif; fill: #222; }
      .coil { fill: none; stroke: #444; stroke-width: 4; }
      .field { fill: none; stroke: #333; stroke-width: 3; marker-end: url(#arrow3); }
      .core { fill: #f3f3f3; stroke: #111; stroke-width: 2; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#fff"/>
  <text x="480" y="36" text-anchor="middle" class="title">Magnetic field of a solenoid</text>

  <rect x="180" y="155" width="600" height="110" rx="18" class="core"/>

  <path class="coil" d="M200 210
    c15 -45, 45 -45, 60 0
    c15 45, 45 45, 60 0
    c15 -45, 45 -45, 60 0
    c15 45, 45 45, 60 0
    c15 -45, 45 -45, 60 0
    c15 45, 45 45, 60 0
    c15 -45, 45 -45, 60 0
    c15 45, 45 45, 60 0
    c15 -45, 45 -45, 60 0"/>

  <path class="field" d="M 230 210 L 730 210"/>
  <path class="field" d="M 230 190 L 730 190"/>
  <path class="field" d="M 230 230 L 730 230"/>

  <path class="field" d="M 760 155 C 860 145, 890 95, 835 60 C 760 20, 450 20, 175 60 C 115 70, 100 125, 180 155"/>
  <path class="field" d="M 760 265 C 860 275, 890 325, 835 360 C 760 400, 450 400, 175 360 C 115 350, 100 295, 180 265"/>

  <text x="160" y="145" class="text">S</text>
  <text x="790" y="145" class="text">N</text>
  <text x="480" y="310" text-anchor="middle" class="text">Strong, nearly uniform field inside the solenoid</text>
</svg>