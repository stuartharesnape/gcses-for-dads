<!-- filename: chemistry0_groups-mean-outer-electrons.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; }
    .small { font-size: 12px; }
    .atom { stroke: #111; stroke-width: 2; fill: none; }
    .nucleus { fill: #111; }
    .electron { fill: #111; }
  </style>

  <rect x="0" y="0" width="1100" height="420" fill="white"/>

  <text x="40" y="40" class="title">Groups = outer electrons</text>

  <!-- Group labels -->
  <text x="120" y="90" class="label">Group 1</text>
  <text x="350" y="90" class="label">Group 2</text>
  <text x="580" y="90" class="label">Group 7</text>
  <text x="810" y="90" class="label">Group 0</text>

  <!-- Group 1 -->
  <circle cx="150" cy="220" r="6" class="nucleus"/>
  <circle cx="150" cy="220" r="35" class="atom"/>
  <circle cx="150" cy="220" r="65" class="atom"/>
  <circle cx="215" cy="220" r="4" class="electron"/>
  <text x="120" y="320" class="small">1 outer electron</text>

  <!-- Group 2 -->
  <circle cx="380" cy="220" r="6" class="nucleus"/>
  <circle cx="380" cy="220" r="35" class="atom"/>
  <circle cx="380" cy="220" r="65" class="atom"/>
  <circle cx="445" cy="220" r="4" class="electron"/>
  <circle cx="315" cy="220" r="4" class="electron"/>
  <text x="350" y="320" class="small">2 outer electrons</text>

  <!-- Group 7 -->
  <circle cx="610" cy="220" r="6" class="nucleus"/>
  <circle cx="610" cy="220" r="35" class="atom"/>
  <circle cx="610" cy="220" r="65" class="atom"/>
  <circle cx="675" cy="220" r="4" class="electron"/>
  <circle cx="660" cy="260" r="4" class="electron"/>
  <circle cx="610" cy="285" r="4" class="electron"/>
  <circle cx="560" cy="260" r="4" class="electron"/>
  <circle cx="545" cy="220" r="4" class="electron"/>
  <circle cx="560" cy="180" r="4" class="electron"/>
  <circle cx="610" cy="155" r="4" class="electron"/>
  <text x="580" y="320" class="small">7 outer electrons</text>

  <!-- Group 0 (full shell) -->
  <circle cx="840" cy="220" r="6" class="nucleus"/>
  <circle cx="840" cy="220" r="35" class="atom"/>
  <circle cx="840" cy="220" r="65" class="atom"/>
  <!-- 8 electrons -->
  <circle cx="905" cy="220" r="4" class="electron"/>
  <circle cx="885" cy="265" r="4" class="electron"/>
  <circle cx="840" cy="285" r="4" class="electron"/>
  <circle cx="795" cy="265" r="4" class="electron"/>
  <circle cx="775" cy="220" r="4" class="electron"/>
  <circle cx="795" cy="175" r="4" class="electron"/>
  <circle cx="840" cy="155" r="4" class="electron"/>
  <circle cx="885" cy="175" r="4" class="electron"/>
  <text x="800" y="320" class="small">full outer shell (8)</text>
  <text x="810" y="340" class="small">does nothing</text>

</svg>