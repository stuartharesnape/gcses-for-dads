<!-- ../images/physics6_longitudinal_wave.svg -->
<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label { font: 16px sans-serif; fill: #222; }
    .small { font: 13px sans-serif; fill: #333; }
    .arrow { stroke: #222; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .particle { stroke: #222; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>

  <text x="30" y="30" class="label">Longitudinal wave</text>

  <g transform="translate(60,110)">
    <line x1="0" y1="0" x2="580" y2="0" stroke="#bbb" stroke-width="2" stroke-dasharray="6 6"/>
    <g>
      <line x1="20" y1="-35" x2="20" y2="35" class="particle"/>
      <line x1="30" y1="-35" x2="30" y2="35" class="particle"/>
      <line x1="40" y1="-35" x2="40" y2="35" class="particle"/>
      <line x1="50" y1="-35" x2="50" y2="35" class="particle"/>
      <line x1="60" y1="-35" x2="60" y2="35" class="particle"/>

      <line x1="130" y1="-35" x2="130" y2="35" class="particle"/>
      <line x1="170" y1="-35" x2="170" y2="35" class="particle"/>

      <line x1="240" y1="-35" x2="240" y2="35" class="particle"/>
      <line x1="250" y1="-35" x2="250" y2="35" class="particle"/>
      <line x1="260" y1="-35" x2="260" y2="35" class="particle"/>
      <line x1="270" y1="-35" x2="270" y2="35" class="particle"/>
      <line x1="280" y1="-35" x2="280" y2="35" class="particle"/>

      <line x1="360" y1="-35" x2="360" y2="35" class="particle"/>
      <line x1="400" y1="-35" x2="400" y2="35" class="particle"/>

      <line x1="470" y1="-35" x2="470" y2="35" class="particle"/>
      <line x1="480" y1="-35" x2="480" y2="35" class="particle"/>
      <line x1="490" y1="-35" x2="490" y2="35" class="particle"/>
      <line x1="500" y1="-35" x2="500" y2="35" class="particle"/>
      <line x1="510" y1="-35" x2="510" y2="35" class="particle"/>
    </g>
  </g>

  <text x="72" y="165" class="small">compression</text>
  <text x="182" y="165" class="small">rarefaction</text>
  <text x="285" y="165" class="small">compression</text>

  <line x1="500" y1="55" x2="610" y2="55" class="arrow"/>
  <text x="500" y="40" class="small">direction of travel</text>
</svg>